version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd-view:/etc/nginx/.htpasswd-view:ro
      - ./nginx/.htpasswd-ctrl:/etc/nginx/.htpasswd-ctrl:ro
    depends_on:
      - api
    networks:
      - autotrader
    restart: unless-stopped

  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./api:/app
      - ~/.aws:/root/.aws:ro
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.txt &&
        python -m uvicorn main:app --host 0.0.0.0 --port 8080 --workers 1
      "
    environment:
      - TRADING_MODE=paper
      - PYTHONPATH=/app
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - ENABLE_DEBUG=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - autotrader
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - autotrader

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=1adTFnPrO7TYOSJ5diiu
      - GF_AUTH_BASIC_ENABLED=true
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_AUTH_DISABLE_SIGNOUT_MENU=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_SECURITY_FORCE_HTTPS_REDIRECT=true
      - GF_SERVER_ROOT_URL=https://lunaraxolotl.com:3000
      - GF_AUTH_GENERIC_OAUTH_ENABLED=false
    restart: unless-stopped
    networks:
      - autotrader

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - autotrader

volumes:
  grafana-storage:
  redis-data:

networks:
  autotrader:
    driver: bridge
