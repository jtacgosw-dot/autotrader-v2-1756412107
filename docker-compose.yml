version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd-view:/etc/nginx/.htpasswd-view:ro
      - ./nginx/.htpasswd-ctrl:/etc/nginx/.htpasswd-ctrl:ro
    depends_on:
      - api
    networks:
      - autotrader
    restart: unless-stopped

  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./api:/app
      - ~/.aws:/root/.aws:ro
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.txt &&
        python -m uvicorn main:app --host 0.0.0.0 --port 8080 --workers 1 --log-level info --proxy-headers --forwarded-allow-ips='*'
      "
    environment:
      - TRADING_MODE=paper
      - PYTHONPATH=/app
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - ENABLE_DEBUG=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - ALERTS_ENABLED=true
      - ALERTS_MIN_SEVERITY=warn
      - ALERTS_DEBOUNCE_SEC=900
      - ALERTS_DIGEST_CRON=0 9 * * *
      - HEALTH_ALERTS_ENABLED=false
    networks:
      - autotrader
    restart: unless-stopped

  discord_bot:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./discord_bot:/app
      - ./alerts:/app/alerts
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.txt &&
        python bot.py
      "
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - API_BASE_URL=http://api:8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ALERTS_ENABLE=${ALERTS_ENABLE:-true}
      - ALERTS_ENV=${ALERTS_ENV:-prod}
      - ALERTS_DEDUPE_TTL_SEC=${ALERTS_DEDUPE_TTL_SEC:-900}
      - ALERTS_COOLDOWN_SEC=${ALERTS_COOLDOWN_SEC:-300}
      - ALERTS_AGG_WINDOW_SEC=${ALERTS_AGG_WINDOW_SEC:-60}
      - ALERTS_MAX_POSTS_PER_MIN=${ALERTS_MAX_POSTS_PER_MIN:-20}
      - ALERTS_HEARTBEAT_INTERVAL_MIN=${ALERTS_HEARTBEAT_INTERVAL_MIN:-30}
      - ALERTS_CHANNEL_INFO=${ALERTS_CHANNEL_INFO:-#alerts}
      - ALERTS_CHANNEL_WARN=${ALERTS_CHANNEL_WARN:-#alerts}
      - ALERTS_CHANNEL_CRIT=${ALERTS_CHANNEL_CRIT:-#pages}
    depends_on:
      - api
      - redis
    networks:
      - autotrader
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - autotrader

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=1adTFnPrO7TYOSJ5diiu
      - GF_AUTH_BASIC_ENABLED=true
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_AUTH_DISABLE_SIGNOUT_MENU=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_SECURITY_FORCE_HTTPS_REDIRECT=true
      - GF_SERVER_ROOT_URL=https://lunaraxolotl.com:3000
      - GF_AUTH_GENERIC_OAUTH_ENABLED=false
    restart: unless-stopped
    networks:
      - autotrader

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - autotrader

volumes:
  grafana-storage:
  redis-data:

networks:
  autotrader:
    driver: bridge
