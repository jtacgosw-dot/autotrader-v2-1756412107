events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=controller_limit:10m rate=5r/s;
    
    # IP allowlist for controller endpoints (optional)
    geo $controller_allowed {
        default 1;
        # Add specific IPs/CIDRs as needed
        # 192.168.1.0/24 1;
        # 10.0.0.0/8 1;
    }
    
    upstream api {
        server api:8080;
    }

    server {
        listen 8081 default_server;
        server_name lunaraxolotl.com _;

        # CORS headers for all locations - dynamic origin validation with credentials
        set $allow_origin "";
        if ($http_origin ~* ^https://app\.lunaraxolotl\.com$) { 
            set $allow_origin $http_origin; 
        }
        
        add_header Access-Control-Allow-Origin $allow_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET,POST,OPTIONS,HEAD" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,Cookie,X-CSRF-Token" always;
        add_header Vary "Origin" always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Debug endpoints (controller only) - moved higher for priority
        location /api/debug/whoami {
            limit_req zone=controller_limit burst=10 nodelay;
            limit_req_status 429;
            
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/debug/cors {
            limit_req zone=controller_limit burst=10 nodelay;
            limit_req_status 429;
            
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        # Test alert endpoint (controller only)
        location = /api/test/alert {
            limit_req zone=controller_limit burst=10 nodelay;
            limit_req_status 429;
            
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        # Controller endpoints with rate limiting and optional IP allowlist
        location ~ ^/api/(pause|resume|risk|maintenance) {
            # Uncomment to enable IP allowlist
            # if ($controller_allowed = 0) {
            #     return 403;
            # }
            
            limit_req zone=controller_limit burst=10 nodelay;
            limit_req_status 429;
            
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        # Login endpoint (no auth required)
        location = /api/login {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;
            
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }

        # All other requests with general rate limiting
        location / {
            limit_req zone=api_limit burst=50 nodelay;
            limit_req_status 429;
            
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
