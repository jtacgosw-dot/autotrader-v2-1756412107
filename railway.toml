[build]
builder = "NIXPACKS"

[build.nixpacksPlan]
providers = ["python"]

[[build.nixpacksPlan.phases.setup]]
nixPkgs = ["python313"]

[[build.nixpacksPlan.phases.install]]
cmds = ["pip install -r api/requirements.txt"]

[[build.nixpacksPlan.phases.build]]
cmds = []

[deploy]
startCommand = "python -m uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1 --proxy-headers"
