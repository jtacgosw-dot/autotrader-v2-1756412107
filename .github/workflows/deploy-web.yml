name: Deploy Web Hub

on:
  push:
    branches: [main, devin/1756409792-ci-cd-setup]
    paths: ['web/**']
  pull_request:
    paths: ['web/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Install dependencies
        run: cd web && npm ci
      
      - name: Run tests
        run: cd web && npx playwright install --with-deps && npm run test
      
      - name: Build
        env:
          VITE_API_BASE: https://api.lunaraxolotl.com
          VITE_ENV: prod
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: cd web && npm run build
  
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devin/1756409792-ci-cd-setup')
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      
      - name: Install dependencies
        run: cd web && npm ci
      
      - name: Build
        env:
          VITE_API_BASE: https://api.lunaraxolotl.com
          VITE_ENV: prod
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: cd web && npm run build
      
      - name: Deploy to S3
        run: |
          cd web
          aws s3 sync dist/ s3://app.lunaraxolotl.com --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude index.html
          aws s3 cp dist/index.html s3://app.lunaraxolotl.com/index.html \
            --cache-control "no-store, must-revalidate" \
            --content-type "text/html"
      
      - name: Invalidate CloudFront
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='autotrader-web-hub'].Id" --output text)
          if [ -z "$DISTRIBUTION_ID" ]; then
            DISTRIBUTION_ID="E2Q821S151MNYL"
          fi
          aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
